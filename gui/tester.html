<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final_Eye · Internal Tester 1.0</title>
  <link rel="stylesheet" href="/tester.css">
</head>
<body>
  <header>
    <div>
      <h1 id="productTitle">Final_Eye Internal Tester</h1>
      <div class="meta" id="productVer">loading…</div>
      <div class="legend" style="margin-top:0.35rem">
        <span class="implemented">implemented</span>
        <span class="measured">measured</span>
        <span class="doctrine">doctrine</span>
        <span class="metaphor">metaphor</span>
      </div>
    </div>
    <div style="text-align:center">
      <div class="health" id="healthPct">—</div>
      <div class="meta">subsystem health</div>
      <div id="readyFlag" style="font-weight:700;margin-top:0.25rem">—</div>
    </div>
    <div class="toolbar">
      <button type="button" class="primary" id="btnRefresh">Refresh + matrix</button>
      <button type="button" id="btnMatrix">Matrix only</button>
      <button type="button" id="btnPoll">Stop poll</button>
      <a href="/" style="color:var(--accent);font-size:0.72rem;margin-left:0.5rem">← Live UI</a>
    </div>
  </header>

  <div class="grid" id="subGrid"></div>

  <section class="matrix-section">
    <h2 style="margin:0 0 0.5rem;font-size:0.75rem;color:var(--muted)">
      Release test matrix · <span id="matrixSummary">—</span>
    </h2>
    <div class="matrix-grid" id="matrixGrid"></div>
  </section>

  <pre class="raw" id="rawJson" aria-label="raw snapshot json"></pre>

  <footer id="footerTs">Polling every 2.5s · port 9479 · factual labels only</footer>
  <script src="/tester.js"></script>
</body>
</html>
